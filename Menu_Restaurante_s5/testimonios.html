    <!DOCTYPE html>
    <html lang="es">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Testimonios de Clientes</title>
    <!-- Bootstrap CSS -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .testimonio {
        border: 1px solid #ccc;
        border-radius: 5px;
        padding: 15px;
        margin: 10px 0;
        }

        /* Color especial para clientes VIP */
        .vip-text {
        color: #e92106eb; /* dorado oscuro */
        font-weight: bold;
        }
    </style>
    </head>
    <body class="container mt-4">

    <h2>Testimonios de Clientes</h2>

    <div class="testimonio testimonio-vip">
        <p>“¡Excelente servicio! Me ayudaron en todo momento.” - Cliente VIP</p>
    </div>

    <div class="testimonio">
        <p>“Muy buena experiencia, volveré pronto.” - Cliente Regular</p>
    </div>

    <div class="testimonio testimonio-vip">
        <p>“Siempre me tratan como prioridad, gracias.” - Cliente VIP</p>
    </div>

    <div class="testimonio">
        <p>“El producto llegó rápido y en buen estado.” - Cliente Regular</p>
    </div>

    <button onclick="resaltarTestimonios()" class="btn btn-dark mt-4">
        Resaltar Testimonios
    </button>

    <script>
        function resaltarTestimonios() {
        // 1. Resaltar VIPs con clase personalizada
        const vipTestimonios = document.getElementsByClassName("testimonio-vip");

        for (let i = 0; i < vipTestimonios.length; i++) {
            const parrafo = vipTestimonios[i].getElementsByTagName("p")[0];
            parrafo.classList.add("vip-text");
        }

        // 2. Resaltar todos los NO VIP con text-danger
        const todosTestimonios = document.getElementsByClassName("testimonio");

        for (let i = 0; i < todosTestimonios.length; i++) {
            const esVIP = todosTestimonios[i].classList.contains("testimonio-vip");
            if (!esVIP) {
            const parrafo = todosTestimonios[i].getElementsByTagName("p")[0];
            parrafo.classList.add("text-success");
            }
        }
        }
    </script>

    </body>
    </html>


    </body>
    </html>
